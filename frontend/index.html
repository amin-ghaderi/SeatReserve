<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeatReserve</title>

  <link rel="stylesheet" href="styles/style.css">
</head>

<body>

  <h1>Event Reservation</h1>

  <form>

    <label for="username">Name:</label>

    <input type="text" id="username" name="username" />
    <br><br>

    <label>Time Slot:</label>

    <br>

    <input type="radio" id="slot1" name="timeslot" value="14-16" />

    <label for="slot1">
      14:00 - 16:00
    </label>

    <br>

    <input type="radio" id="slot2" name="timeslot" value="17-19" />

    <label for="slot2">
      17:00 - 19:00
    </label>

    <br>

    <input type="radio" id="slot3" name="timeslot" value="20-22" />

    <label for="slot3">
      20:00 - 22:00
    </label>
  </form>

</body>

</html>
